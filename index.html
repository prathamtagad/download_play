<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Old Is Gold — Download & Play</title>
  <style>
    :root{--bg:#0f1720;--card:#0b1220;--accent:#10b981;--muted:#9ca3af;color-scheme:dark}
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,system-ui,Arial;background:linear-gradient(180deg,#071028 0%,#05111a 100%);color:#e6eef6}
    .wrap{max-width:940px;margin:36px auto;padding:20px}
    header{display:flex;align-items:center;gap:16px}
    h1{margin:0;font-size:20px}
    .card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;margin-top:18px}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type=text], select{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit}
    .row{display:grid;grid-template-columns:1fr 160px;gap:12px;align-items:end}
    button{background:var(--accent);color:#042024;padding:10px 12px;border-radius:8px;border:none;cursor:pointer}
    .muted{color:var(--muted);font-size:13px}
    .actions{display:flex;gap:10px;margin-top:12px}
    .player{margin-top:18px;display:flex;gap:12px;align-items:center}
    audio{width:100%}
    .small{font-size:13px}
    .log{font-family:monospace;background:rgba(0,0,0,0.2);padding:8px;border-radius:6px;margin-top:12px;max-height:160px;overflow:auto}
    .song-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .song-item{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:10px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .song-item:hover{background:rgba(255,255,255,0.08)}
    .song-name{flex:1;word-break:break-all}
    .song-item button{padding:6px 10px;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="img/logo.png" alt="logo" width="42" height="42" style="border-radius:8px;object-fit:cover"/>
      <div>
        <h1>Download & Play</h1>
        <div class="muted small">Enter a YouTube URL or just type a song name to search and download</div>
      </div>
    </header>

    <div class="card">
      <div>
        <label for="url">URL or Song Name</label>
        <input id="url" type="text" placeholder="https://... or song name (e.g., 'Adele Rolling in the Deep')" />
      </div>

      <div style="margin-top:12px">
        <label for="format">Format</label>
        <select id="format">
          <option value="mp3">mp3 (broad browser support)</option>
          <option value="m4a">m4a</option>
          <option value="opus">opus</option>
        </select>
      </div>

      <div class="row" style="margin-top:12px">
        <div>
          <label for="expected">Expected filename (optional)</label>
          <input id="expected" type="text" placeholder="my-song-name (without extension)" />
        </div>
        <div style="display:flex;flex-direction:column">
          <button id="download">Download</button>
          <button id="download-demo" style="margin-top:8px;background:#334155">Demo</button>
        </div>
      </div>

      <div class="actions">
        <div class="muted">Server endpoint: <code>/download</code></div>
      </div>

      <div id="status" class="muted" style="margin-top:10px">Ready</div>
      <div id="log" class="log" aria-live="polite"></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">Play downloaded file</h3>
      <label for="playname">Filename inside <code>/downloads/</code> (e.g. song.mp3)</label>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="playname" type="text" placeholder="song.mp3" />
        <button id="play">Play</button>
        <button id="stop" style="background:#ef4444">Stop</button>
      </div>

      <div class="player">
        <audio id="audio" controls></audio>
      </div>
      <div class="muted small" style="margin-top:8px">If the file isn't available yet, wait for yt-dlp to finish on the server and then enter the filename here.</div>
    </div>

    <div class="card">
      <h3 style="margin-top:0">Downloaded Songs</h3>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button id="refresh-list" style="background:#334155">Refresh List</button>
      </div>
      <div id="song-list" class="song-list">
        <div class="muted" style="text-align:center;padding:20px">Loading...</div>
      </div>
    </div>
  </div>

  <script>
    const urlEl = document.getElementById('url');
    const downloadBtn = document.getElementById('download');
    const demoBtn = document.getElementById('download-demo');
    const formatEl = document.getElementById('format');
    const expectedEl = document.getElementById('expected');
    const statusEl = document.getElementById('status');
    const logEl = document.getElementById('log');

    const playInput = document.getElementById('playname');
    const playBtn = document.getElementById('play');
    const stopBtn = document.getElementById('stop');
    const audio = document.getElementById('audio');
    const songListEl = document.getElementById('song-list');
    const refreshListBtn = document.getElementById('refresh-list');

    function appendLog(txt){
      const d = document.createElement('div'); d.textContent = txt; logEl.appendChild(d); logEl.scrollTop = logEl.scrollHeight;
    }

    async function loadSongList(){
      try {
        const res = await fetch('/downloads-list');
        const data = await res.json();
        songListEl.innerHTML = '';
        
        if(data.files && data.files.length > 0){
          data.files.forEach(file => {
            const item = document.createElement('div');
            item.className = 'song-item';
            item.innerHTML = `
              <span class="song-name">${file}</span>
              <button class="play-song-btn" data-file="${file}">Play</button>
              <button class="delete-song-btn" data-file="${file}" style="background:#ef4444">Delete</button>
            `;
            songListEl.appendChild(item);
          });
          
          // Add event listeners to play buttons
          document.querySelectorAll('.play-song-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const file = btn.getAttribute('data-file');
              const fileUrl = '/downloads/' + encodeURIComponent(file);
              audio.src = fileUrl;
              audio.play().then(()=>{
                statusEl.textContent = 'Playing: ' + file;
                appendLog('Playing: ' + file);
                playInput.value = file;
              }).catch(err => {
                statusEl.textContent = 'Unable to play';
                appendLog('Play error: ' + err.message);
              });
            });
          });
          
          // Add event listeners to delete buttons (optional - for future enhancement)
          document.querySelectorAll('.delete-song-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
              e.stopPropagation();
              const file = btn.getAttribute('data-file');
              appendLog('Delete feature coming soon for: ' + file);
            });
          });
        } else {
          songListEl.innerHTML = '<div class="muted" style="text-align:center;padding:20px">No songs downloaded yet</div>';
        }
      } catch(err) {
        songListEl.innerHTML = '<div class="muted" style="text-align:center;padding:20px">Error loading songs</div>';
        appendLog('Error loading song list: ' + err.message);
      }
    }

    refreshListBtn.addEventListener('click', loadSongList);

    downloadBtn.addEventListener('click', async ()=>{
      const url = urlEl.value.trim();
      if(!url){ statusEl.textContent = 'Enter a URL or search query first'; return }
      const payload = { url, format: formatEl.value };
      statusEl.textContent = 'Starting download...';
      appendLog('POST /download ' + JSON.stringify(payload));
      try{
        // Get the current file list to know how many files exist before download
        const initialListRes = await fetch('/downloads-list');
        const initialListData = await initialListRes.json();
        const initialFileCount = initialListData.files ? initialListData.files.length : 0;
        
        const res = await fetch('/download', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)});
        const data = await res.json();
        appendLog('Response: ' + JSON.stringify(data));
        if(res.ok){
          statusEl.textContent = 'Download started on server';
          appendLog('Waiting for download to complete...');
          
          // Poll for the new file and wait for it to stabilize
          let pollCount = 0;
          let previousSize = -1;
          let stableSizeCount = 0;
          let newFileFound = false;
          let targetFile = null;
          
          const pollInterval = setInterval(async () => {
            pollCount++;
            try {
              const listRes = await fetch('/downloads-list');
              const listData = await listRes.json();
              
              // Check if a new file has been created
              if(listData.files && listData.files.length > initialFileCount && !newFileFound){
                // A new file has appeared
                targetFile = listData.files[0]; // Get the newest file
                newFileFound = true;
                appendLog(`New file detected: ${targetFile}`);
              }
              
              // If we found the new file, track its size until it stabilizes
              if(newFileFound && targetFile){
                const sizeRes = await fetch('/file-size/' + encodeURIComponent(targetFile));
                const sizeData = await sizeRes.json();
                
                if(sizeData.size){
                  const currentSize = sizeData.size;
                  
                  // Check if file size has stabilized (hasn't changed in last 2 checks)
                  if(currentSize === previousSize){
                    stableSizeCount++;
                  } else {
                    stableSizeCount = 0;
                  }
                  
                  previousSize = currentSize;
                  appendLog(`Download progress: ${targetFile} (${(currentSize / 1024 / 1024).toFixed(2)} MB)`);
                  
                  // File is considered downloaded when size is stable for 2 consecutive checks (2 seconds)
                  if(stableSizeCount >= 2){
                    clearInterval(pollInterval);
                    
                    const fileUrl = '/downloads/' + encodeURIComponent(targetFile);
                    audio.src = fileUrl;
                    audio.play().then(()=>{
                      statusEl.textContent = 'Playing: ' + targetFile;
                      appendLog('Download complete! Now playing: ' + targetFile);
                      playInput.value = targetFile;
                      loadSongList(); // Refresh the song list
                    }).catch(e=>{
                      appendLog('Auto-play error: ' + e.message);
                    });
                  }
                }
              }
            } catch(err) {
              if(pollCount > 300) {
                clearInterval(pollInterval); // Stop after 5 minutes
                appendLog('Download timeout');
              }
            }
          }, 1000); // Poll every 1 second
        } else {
          statusEl.textContent = 'Server error: ' + (data.error||res.status);
        }
      }catch(err){
        appendLog('Network error: ' + err.message);
        statusEl.textContent = 'Network error';
      }
    });

    demoBtn.addEventListener('click', ()=>{
      // A short demo URL that many setups can handle if yt-dlp is installed
      urlEl.value = 'ytsearch1:adele rolling in the deep';
    });

    playBtn.addEventListener('click', ()=>{
      const name = playInput.value.trim();
      if(!name){ statusEl.textContent = 'Enter a filename to play (e.g. song.mp3)'; return }
      const url = '/downloads/' + encodeURIComponent(name);
      audio.src = url;
      audio.play().then(()=>{
        statusEl.textContent = 'Playing ' + name;
        appendLog('Playing: ' + url);
      }).catch(e=>{
        statusEl.textContent = 'Unable to play (maybe file not found or unsupported)';
        appendLog('Play error: ' + e.message);
      });
    });

    stopBtn.addEventListener('click', ()=>{
      audio.pause(); audio.currentTime = 0; statusEl.textContent = 'Stopped';
    });

    // Load song list on page load
    loadSongList();
  </script>
</body>
</html>
